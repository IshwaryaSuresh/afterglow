<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Afterglow</title>
<meta name="theme-color" content="#061418" />
<meta name="robots" content="noindex" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Afterglow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#061418; --ink:#E6F5F1; --ink-dim:rgba(230,245,241,0.72); --ink-faint:rgba(230,245,241,0.55);
    --accent:#5EEAD4; --line:rgba(230,245,241,0.10);
    --happiness:#E8B24A; --sadness:#3E5C8C; --anger:#C0413A; --anxious:#A7A24F; --nostalgic:#B98AA6; --love:#EA6FA4; --calm:#2FA8A0; --gratitude:#7FB58F;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{ background:#02060A; color:var(--ink); font-family:var(--sans); font-weight:300; -webkit-font-smoothing:antialiased; }
  .app{ position:fixed; inset:0; display:flex; justify-content:center; }
  .device{ position:relative; width:100%; max-width:480px; height:100dvh; background:var(--bg); overflow-y:auto; -webkit-overflow-scrolling:touch; }

  /* glow recipe (matches the prototype) */
  .glow{ width:160px; height:160px; border-radius:50%; filter:blur(10px); animation:breathe 10s ease-in-out infinite; }
  .glow.lg{ width:200px; height:200px; }
  .glow.sm{ width:64px; height:64px; filter:blur(5px); }
  .glow-happiness{ background:radial-gradient(circle, rgba(250,239,218,.85) 0%, #f1d296 25%, #E8B24A 50%, rgba(232,178,74,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(232,178,74,.5); }
  .glow-sadness{ background:radial-gradient(circle, rgba(216,222,232,.85) 0%, #8fa0bc 25%, #3E5C8C 50%, rgba(62,92,140,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(62,92,140,.5); }
  .glow-anger{ background:radial-gradient(circle, rgba(242,217,215,.85) 0%, #da908c 25%, #C0413A 50%, rgba(192,65,58,.3) 75%, transparent 100%);box-shadow:0 0 100px 16px rgba(192,65,58,.5) }
  .glow-anxious{ background:radial-gradient(circle, rgba(237,236,219,.85) 0%, #cbc998 25%, #A7A24F 50%, rgba(167,162,79,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(167,162,79,.5); }
  .glow-nostalgic{ background:radial-gradient(circle, rgba(241,231,237,.85) 0%, #d6bbcb 25%, #B98AA6 50%, rgba(185,138,166,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(185,138,166,.5); }
  .glow-love{ background:radial-gradient(circle, rgba(250,226,236,.85) 0%, #f2abca 25%, #EA6FA4 50%, rgba(234,111,164,.3) 75%, transparent 100%);box-shadow:0 0 100px 16px rgba(234,111,164,.5) }
  .glow-calm{ background:radial-gradient(circle, rgba(213,237,236,.85) 0%, #86ccc7 25%, #2FA8A0 50%, rgba(47,168,160,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(47,168,160,.5); }
  .glow-gratitude{ background:radial-gradient(circle, rgba(229,240,232,.85) 0%, #b4d4be 25%, #7FB58F 50%, rgba(127,181,143,.3) 75%, transparent 100%); box-shadow:0 0 100px 16px rgba(127,181,143,.5); }
  @keyframes breathe{ 0%,100%{transform:scale(1);opacity:.92} 50%{transform:scale(1.05);opacity:1} }
  @media (prefers-reduced-motion:reduce){ .glow{animation:none} }

  /* layout helpers */
  .screen{ min-height:100%; display:flex; flex-direction:column; padding:48px 24px 32px; }
  .center{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px; }
  h1{ font-family:var(--serif); font-weight:300; font-size:32px; }
  h2{ font-family:var(--serif); font-weight:300; font-size:22px; }
  .serif-it{ font-family:var(--serif); font-style:italic; font-weight:300; }
  .dim{ color:var(--ink-dim); } .faint{ color:var(--ink-faint); }
  .tiny{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); }

  input, .input{
    width:100%; min-height:50px; padding:0 16px; border-radius:14px; border:1px solid var(--line);
    background:rgba(2,6,10,.5); color:var(--ink); font-family:var(--sans); font-size:15px; margin-top:10px;
  }
  input:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:52px; padding:0 24px; border-radius:999px;
    background:rgba(94,234,212,.12); border:1px solid rgba(94,234,212,.5); color:var(--ink); font-family:var(--sans); font-size:15px;
    cursor:pointer; box-shadow:0 0 30px rgba(94,234,212,.14); margin-top:14px; transition:box-shadow .2s; }
  .btn:hover{ box-shadow:0 0 42px rgba(94,234,212,.26); }
  .btn:disabled{ opacity:.5; cursor:default; box-shadow:none; }
  .btn.ghost{ background:transparent; border-color:rgba(230,245,241,0.20); color:var(--ink-dim); box-shadow:none; }
  .link{ color:var(--accent); cursor:pointer; text-decoration:none; font-size:14px; background:none; border:0;
    font-family:inherit; min-height:44px; display:inline-flex; align-items:center; padding:8px; margin:-8px; }
  .iconbtn{ background:none; border:0; color:var(--ink); cursor:pointer; min-width:44px; min-height:44px;
    display:inline-flex; align-items:center; justify-content:center; padding:8px; margin:-8px; border-radius:10px; }
  /* visible keyboard focus everywhere; hidden for mouse/touch */
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:8px; }
  :focus:not(:focus-visible){ outline:none; }
  [role="button"]{ cursor:pointer; }
  .err{ color:#ff9b9b; font-size:13px; margin-top:10px; min-height:18px; }
  .card{ width:100%; border:1px solid var(--line); background:rgba(230,245,241,.02); border-radius:22px; padding:26px 20px; text-align:center; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:6px; }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:10px 14px; border-radius:999px; border:1px solid var(--line); background:rgba(230,245,241,.03); color:var(--ink); font-size:13px; cursor:pointer; }
  .chip .dot{ width:8px; height:8px; border-radius:50%; box-shadow:0 0 8px currentColor; }
  .chip[aria-pressed="true"]{ border-color:rgba(94,234,212,.7); box-shadow:0 0 20px rgba(94,234,212,.2); }
  .hidden{ display:none !important; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; }
  .row{ display:flex; gap:10px; }
  .merge{ position:relative; width:200px; height:160px; }
  .merge .glow{ position:absolute; top:50%; transform:translateY(-50%); mix-blend-mode:screen; }
  .merge .a{ left:6px } .merge .b{ right:6px }
  .toast{ position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:rgba(6,20,24,.95); border:1px solid var(--line); border-radius:999px; padding:12px 20px; font-size:13px; color:var(--ink); opacity:0; transition:opacity .3s; z-index:50; }
  .toast.show{ opacity:1; }
  .spin{ width:34px;height:34px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);animation:rot 1s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---- warmth interaction ---- */
  .warm-stage{ position:relative; display:flex; align-items:center; justify-content:center; width:280px; height:280px; }
  .warm-glow{ will-change:transform,filter; }
  .warm-ring{ position:absolute; inset:30px; border-radius:50%; opacity:0; transition:opacity .35s;
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px)); }
  .warm-ring.on{ opacity:.95; }
  .ripple{ position:absolute; left:50%; top:50%; width:80px; height:80px; border-radius:50%; border:1px solid var(--accent);
    transform:translate(-50%,-50%) scale(.6); opacity:.7; pointer-events:none; animation:ripple 1.6s ease-out forwards; }
  @keyframes ripple{ to{ transform:translate(-50%,-50%) scale(4.2); opacity:0; } }
  .heart{ position:absolute; left:50%; top:54%; font-size:18px; color:#ffd9dd; pointer-events:none; opacity:0;
    text-shadow:0 0 10px rgba(255,180,190,.6); animation:floatUp 2s ease-out forwards; }
  @keyframes floatUp{ 0%{opacity:0;transform:translate(-50%,0) scale(.5)} 18%{opacity:1} 100%{opacity:0;transform:translate(var(--dx,-50%),-150px) scale(1.15)} }
  .warm-btn-hold{ background:rgba(94,234,212,.2); border-color:rgba(94,234,212,.85); box-shadow:0 0 50px rgba(94,234,212,.35); }

  /* ---- together (both here) ---- */
  .together-stage{ position:relative; width:300px; height:240px; margin:0 auto; }
  .tg-orb{ position:absolute; top:50%; left:50%; }
  .tg-orb .glow{ mix-blend-mode:screen; }
  .tg-a{ animation:tgDriftA 3.4s cubic-bezier(.35,0,.2,1) forwards; }
  .tg-b{ animation:tgDriftB 3.4s cubic-bezier(.35,0,.2,1) forwards; }
  @keyframes tgDriftA{ 0%{transform:translate(calc(-50% - 92px),-50%);opacity:.35} 100%{transform:translate(calc(-50% - 36px),-50%);opacity:1} }
  @keyframes tgDriftB{ 0%{transform:translate(calc(-50% + 92px),-50%);opacity:.35} 100%{transform:translate(calc(-50% + 36px),-50%);opacity:1} }
  .tg-halo{ position:absolute; top:50%; left:50%; width:230px; height:230px; border-radius:50%; opacity:0;
    transform:translate(-50%,-50%) scale(.55); background:radial-gradient(circle, rgba(94,234,212,.16), transparent 68%);
    animation:tgHalo 3.4s ease-out .5s forwards; }
  @keyframes tgHalo{ to{ opacity:1; transform:translate(-50%,-50%) scale(1); } }
  @media (prefers-reduced-motion:reduce){
    .tg-a,.tg-b,.tg-halo{ animation:none; }
    .tg-a{ transform:translate(calc(-50% - 36px),-50%); }
    .tg-b{ transform:translate(calc(-50% + 36px),-50%); }
    .tg-halo{ opacity:1; transform:translate(-50%,-50%); }
  }

  /* ---- history: calendar + story ---- */
  .cal-head{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; }
  .cal-head h2{ min-width:168px; text-align:center; }
  .cal-head .iconbtn{ font-size:24px; color:var(--accent); }
  .iconbtn:disabled{ opacity:.28; cursor:default; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:18px; }
  .cal-h{ text-align:center; padding:2px 0; }
  .cal-cell{ aspect-ratio:1; border-radius:12px; border:1px solid var(--line); position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:rgba(230,245,241,.02); }
  .cal-cell.has{ border-color:rgba(94,234,212,.28); background:rgba(94,234,212,.05); }
  .cal-cell.today{ outline:1px solid rgba(94,234,212,.5); }
  .cal-num{ font-size:11px; color:var(--ink-faint); }
  .cal-orbs{ display:flex; gap:3px; min-height:8px; align-items:center; }
  .cal-dot{ width:7px; height:7px; border-radius:50%; }
  .cal-dot.mine{ outline:1.5px solid rgba(230,245,241,.75); outline-offset:1px; }
  body.bg-paused .glow, body.bg-paused .ring-core, body.bg-paused .ring-spin{ animation-play-state:paused; }

  /* ---- lanterns (forgiving milestones) ---- */
  .lantern-stage{ position:relative; width:220px; height:230px; margin:0 auto 4px; display:flex; align-items:center; justify-content:center; }
  .lantern{ width:124px; height:124px; border-radius:50%; filter:blur(6px);
    background:radial-gradient(circle, #fff 0%, rgba(255,238,200,.95) 18%, #E0A24B 50%, rgba(224,162,75,0) 78%);
    box-shadow:0 0 72px 14px rgba(224,162,75,.55); animation:lanternBreathe 6s ease-in-out infinite; }
  .lantern.rise{ animation:lanternRise 1.7s cubic-bezier(.2,.7,.2,1), lanternBreathe 6s ease-in-out 1.7s infinite; }
  @keyframes lanternRise{ 0%{transform:translateY(90px) scale(.45);opacity:0} 55%{opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes lanternBreathe{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-6px) scale(1.04)} }
  .ember{ position:absolute; bottom:48px; width:5px; height:5px; border-radius:50%; background:#ecbf7a;
    box-shadow:0 0 8px #E0A24B; opacity:0; animation:emberUp 2.6s ease-out forwards; }
  @keyframes emberUp{ 0%{opacity:0;transform:translateY(0)} 16%{opacity:.9} 100%{opacity:0;transform:translateY(-160px)} }
  .lantern-strip{ margin:4px 0 16px; }
  .lantern-row{ display:flex; gap:10px; overflow-x:auto; padding:10px 2px 4px; scrollbar-width:none; }
  .lantern-row::-webkit-scrollbar{ display:none; }
  .lantern-chip{ flex:0 0 auto; display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line);
    border-radius:999px; padding:8px 14px; background:rgba(224,162,75,.06); color:var(--ink); font-size:13px; cursor:pointer; }
  .lantern-chip:hover{ border-color:rgba(224,162,75,.5); }
  .lantern-dot{ width:12px; height:12px; border-radius:50%; flex:0 0 auto;
    background:radial-gradient(circle, #fff, #E0A24B 60%, transparent); box-shadow:0 0 8px #E0A24B; }
  @media (prefers-reduced-motion:reduce){ .lantern, .lantern.rise{ animation:none; } .ember{ display:none; } }

  /* ---- meet in the light (live shared breath) ---- */
  .presence-pill{ display:inline-flex; align-items:center; gap:9px; border:1px solid rgba(94,234,212,.32);
    background:rgba(94,234,212,.07); color:var(--ink); border-radius:999px; padding:9px 18px; font-size:13.5px; cursor:pointer; }
  .presence-pill:hover{ border-color:rgba(94,234,212,.6); box-shadow:0 0 24px rgba(94,234,212,.14); }
  .presence-dot{ width:8px; height:8px; border-radius:50%; background:#5EEAD4; box-shadow:0 0 9px #5EEAD4; animation:pdot 2.4s ease-in-out infinite; }
  @keyframes pdot{ 0%,100%{opacity:.45} 50%{opacity:1} }
  .meet-merge{ position:relative; width:300px; height:250px; margin:0 auto; will-change:transform; }
  .meet-merge .glow{ position:absolute; top:50%; transform:translateY(-50%); mix-blend-mode:screen; transition:opacity .7s ease; }
  .meet-merge .ma{ left:34px } .meet-merge .mb{ right:34px }
  .meet-merge.waiting .mb{ opacity:.26 }
  .meet-guide{ font-family:var(--serif); font-style:italic; color:var(--dim); font-size:19px; letter-spacing:.02em; min-height:26px; }
  .meet-pulse{ position:absolute; left:50%; top:50%; width:90px; height:90px; border-radius:50%; border:1px solid var(--accent);
    transform:translate(-50%,-50%) scale(.55); opacity:.7; pointer-events:none; animation:ripple 1.6s ease-out forwards; }
  @media (prefers-reduced-motion:reduce){ .presence-dot{ animation:none; } .meet-pulse{ display:none; } }
  .story-hero{ text-align:center; padding:10px 0 18px; }
  .story-hero .merge{ width:120px; height:64px; margin:0 auto 14px; }
  /* concentric story rings (each ring = a day, newest outermost) — soft luminous halos */
  .ring-stage{ position:relative; width:320px; height:320px; margin:6px auto 16px; cursor:pointer; }
  .ring-spin{ position:absolute; inset:0; animation:slowspin 90s linear infinite; }
  @keyframes slowspin{ to{ transform:rotate(360deg); } }
  .ring{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:50%; pointer-events:none;
    border:1px solid currentColor; box-shadow:0 0 16px 1px currentColor, inset 0 0 14px 0 currentColor; opacity:.45; }
  .ring-core{ position:absolute; top:50%; left:50%; width:120px; height:120px; border-radius:50%; pointer-events:none;
    transform:translate(-50%,-50%); filter:blur(5px); animation:coreBreathe 10s ease-in-out infinite; }
  @keyframes coreBreathe{ 0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:.94 } 50%{ transform:translate(-50%,-50%) scale(1.08); opacity:1 } }
  .ring-aura{ position:absolute; top:50%; left:50%; width:340px; height:340px; border-radius:50%; pointer-events:none;
    transform:translate(-50%,-50%); filter:blur(34px); opacity:.45; }
  .ring.ghost{ border:1px solid rgba(230,245,241,.06); box-shadow:none; opacity:1; }
  .story-legend{ display:flex; gap:11px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
  .story-legend span{ display:inline-flex; align-items:center; gap:4px; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }
  .story-legend i{ width:6px; height:6px; border-radius:50%; }
  @media (prefers-reduced-motion:reduce){ .ring-spin{ animation:none; } .ring-core{ animation:none; } }
  .story-thread{ position:relative; padding-left:30px; }
  .story-thread::before{ content:''; position:absolute; left:9px; top:8px; bottom:8px; width:2px;
    background:linear-gradient(var(--line), rgba(94,234,212,.18), var(--line)); border-radius:2px; }
  .story-month{ font-family:var(--serif); font-style:italic; color:var(--ink-faint); font-size:13px; margin:16px 0 10px; }
  .story-day{ position:relative; margin-bottom:14px; border:1px solid var(--line); border-radius:18px;
    padding:15px 16px; background:rgba(230,245,241,.02); cursor:pointer; transition:border-color .2s, background .2s, transform .2s; }
  .story-day:hover{ border-color:rgba(94,234,212,.28); background:rgba(94,234,212,.04); }
  .story-day:active{ transform:scale(.99); }
  .story-day .node{ position:absolute; left:-25px; top:20px; width:10px; height:10px; border-radius:50%;
    background:var(--bg); border:1px solid rgba(94,234,212,.45); }
  .story-day .node.both{ background:rgba(94,234,212,.55); box-shadow:0 0 10px rgba(94,234,212,.5); border-color:transparent; }
  .sd-date{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }
  .sd-glows{ display:flex; align-items:center; height:46px; margin:8px 0 4px; }
  .sd-glows .glow{ width:44px; height:44px; filter:blur(5px); animation:none; mix-blend-mode:screen; }
  .sd-glows .glow + .glow{ margin-left:-16px; }
  .sd-line{ font-family:var(--serif); font-size:15px; line-height:1.4; }
  .sd-line .mood-em{ font-style:italic; }
  .sd-note{ font-family:var(--serif); font-style:italic; color:var(--ink-dim); font-size:13.5px;
    margin-top:9px; border-left:1px solid var(--line); padding-left:11px; }
  .sd-warm{ color:rgba(94,234,212,.7); font-size:11px; letter-spacing:.05em; margin-top:9px; }

  /* ---- day letter (one day as a page) ---- */
  .letter-head{ text-align:center; padding:6px 0 10px; }
  .letter-head h1{ font-family:var(--serif); font-weight:300; font-size:30px; line-height:1.1; }
  .letter-head .sub{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin-top:8px; }
  .letter-merge{ margin:14px auto 4px; }
  .letter-pass{ padding:22px 2px 18px; text-align:center; }
  .lp-glow{ width:46px; height:46px; filter:blur(6px); animation:breathe 10s ease-in-out infinite; margin:0 auto; }
  .lp-name{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-dim); margin-top:12px; }
  .lp-name b{ color:var(--ink); font-weight:400; }
  .lp-word{ font-size:13px; letter-spacing:.03em; color:var(--ink-faint); margin-top:7px; }
  .lp-msg{ font-family:var(--serif); font-style:italic; font-weight:300; font-size:20px; line-height:1.5;
    color:var(--ink); margin:14px auto 0; max-width:320px; }
  .lp-warm{ color:rgba(94,234,212,.72); font-size:11px; letter-spacing:.05em; margin-top:14px; }
  .lp-divider{ height:1px; background:linear-gradient(90deg, transparent, var(--line), transparent); margin:2px 30px; }
  .lp-private{ margin:16px auto 0; max-width:320px; border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; background:rgba(230,245,241,.02); }
  .lp-private .tiny{ display:block; margin-bottom:7px; }
  .lp-private p{ font-family:var(--serif); font-style:italic; color:var(--ink-dim); font-size:15px; line-height:1.45; }

  /* ---- glow send-off ---- */
  .sent-glow{ animation:sendOff 2.1s cubic-bezier(.4,0,.5,1) forwards; }
  @keyframes sendOff{ 0%{transform:translateY(10px) scale(.9);opacity:.7}
    28%{transform:translateY(0) scale(1.12);opacity:1}
    100%{transform:translateY(-160px) scale(.22);opacity:0;filter:blur(16px)} }
  @media (prefers-reduced-motion:reduce){ .sent-glow{animation:none;opacity:.6} .ripple,.heart{display:none} }
</style>
</head>
<body>
<div class="app"><div class="device" id="root">
  <div class="screen"><div class="center"><div class="spin"></div><p class="faint tiny">loading</p></div></div>
</div></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

// Web Push (closed-app notifications). Public key is safe to ship; private key lives only in the Edge Function.
const VAPID_PUBLIC = "BKjJM3qN5tOKPHwSkr0T7xtmcEEaSE2FQt1uN1cvHIiNLoGq4T6LpQ6cHX8ExEB3TFEdamtLAl-POieg3rUjpNY";
function urlB64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){
  try{
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC) }); }
    const j=sub.toJSON();
    await sb.from('push_subs').upsert({ endpoint:sub.endpoint, user_id:STATE.user.id, p256dh:j.keys.p256dh, auth:j.keys.auth }, { onConflict:'endpoint' });
    return true;
  }catch(e){ return false; }
}
async function unsubscribePush(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ await sb.from('push_subs').delete().eq('endpoint', sub.endpoint); await sub.unsubscribe(); }
  }catch(e){}
}

// ---- LANTERNS: forgiving milestones, computed from real shared history ----
// Earned by elapsed time together OR total evenings shared — never consecutive, never resettable.
const LANTERNS = [
  {key:'evenings_5',   type:'evenings', n:5,   title:'Five evenings',         blurb:'Five times you have shown up for each other.'},
  {key:'days_30',      type:'days',     n:30,  title:'Your first month',      blurb:'A whole month of evenings, tended together — every one of them, even the quiet days.'},
  {key:'evenings_25',  type:'evenings', n:25,  title:'Twenty-five evenings',  blurb:'Twenty-five times your lights have met.'},
  {key:'evenings_50',  type:'evenings', n:50,  title:'Fifty evenings',        blurb:'Fifty glows shared between you.'},
  {key:'days_90',      type:'days',     n:90,  title:'A season of light',     blurb:'Three months of staying close, in your own gentle way.'},
  {key:'evenings_100', type:'evenings', n:100, title:'A hundred evenings',    blurb:'A hundred evenings, kept.'},
  {key:'days_180',     type:'days',     n:180, title:'Half a year, together', blurb:'Six months of quiet presence.'},
  {key:'days_365',     type:'days',     n:365, title:'A year, together',      blurb:'A whole year of evenings. Look how far the light has travelled.'},
];
function addDays(d,n){ const t=new Date(d+'T00:00'); t.setDate(t.getDate()+n);
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
function computeLanterns(datesAsc){
  if(!datesAsc || !datesAsc.length) return [];
  const first=datesAsc[0];
  const daysTogether=Math.floor((new Date(todayLocal()+'T00:00')-new Date(first+'T00:00'))/86400000);
  const evenings=datesAsc.length;
  const out=[];
  for(const L of LANTERNS){
    if(L.type==='evenings' && evenings>=L.n) out.push({...L, earnedOn:datesAsc[L.n-1]});
    else if(L.type==='days' && daysTogether>=L.n) out.push({...L, earnedOn:addDays(first, L.n)});
  }
  out.sort((a,b)=> a.earnedOn<b.earnedOn?-1:1);
  return out;
}
async function syncLanterns(){
  if(!STATE.couple) return false;
  const { data:glows } = await sb.from('glows').select('local_date').eq('couple_id', STATE.couple);
  const datesAsc=[...new Set((glows||[]).map(g=>g.local_date))].sort();
  STATE.lanterns=computeLanterns(datesAsc);
  const ck='afterglow_lanterns_'+STATE.couple;
  const celebrated=new Set(JSON.parse(localStorage.getItem(ck)||'[]'));
  const fresh=STATE.lanterns.filter(L=>!celebrated.has(L.key));
  if(!fresh.length) return false;
  STATE.lanterns.forEach(L=>celebrated.add(L.key));               // record all (don't re-celebrate history)
  localStorage.setItem(ck, JSON.stringify([...celebrated]));
  const crossedToday=fresh.filter(L=>L.earnedOn===todayLocal());  // only bloom for one truly crossed today
  if(crossedToday.length){ renderLantern(crossedToday[crossedToday.length-1], {celebrate:true}); return true; }
  return false;
}

      <div class="lantern ${(opts.celebrate && !reduce)?'rise':''}"></div>
    </div>
    <p class="tiny">${opts.celebrate?'A lantern lit':'A lantern, kept'}</p>
    <h1 style="font-size:30px;max-width:330px">${esc(L.title)}</h1>
    <p class="serif-it dim" style="max-width:320px;font-size:16px;line-height:1.55">${esc(L.blurb)}</p>
    ${L.earnedOn?`<p class="faint" style="font-size:12px;margin-top:6px">${fmtDate(L.earnedOn)}</p>`:''}
    <button class="btn" id="carry" style="max-width:280px">${opts.celebrate?'Carry it with you':'Back to your story'}</button>
  </div></div>`;
  if(opts.celebrate && !reduce){
    const st=document.getElementById('lanternStage');
    for(let i=0;i<5;i++){ const e=document.createElement('div'); e.className='ember'; e.style.left=(40+Math.random()*22)+'%'; e.style.animationDelay=(0.3+i*0.22)+'s'; st.appendChild(e); }
  }
  document.getElementById('carry').onclick=()=> opts.fromStory?renderStory():(STATE.couple?renderToday():renderAuth());
}

function todayLocal(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function boot(){

}
sb.auth.onAuthStateChange((event, session)=>{

  if(!session){
    if(meetRaf){ cancelAnimationFrame(meetRaf); meetRaf=null; }
    if(STATE.presenceChan){ try{ sb.removeChannel(STATE.presenceChan); }catch(e){} }
    STATE={user:null,profile:null,couple:null,partner:null,realtimeChan:null,presenceChan:null};
    renderAuth();
  }

async function loadContext(){
  renderLoading();
  try{
    // profile
    let { data:prof } = await sb.from('profiles').select('*').eq('id', STATE.user.id).single();
    STATE.profile = prof;
    // OAuth users arrive without a chosen name — adopt the one Google/Apple provided
    if(prof && prof.display_name==='Someone'){
      const m=STATE.user.user_metadata||{};
      const nm=(m.display_name||m.full_name||m.name||'').trim().split(' ')[0];
      if(nm){ await sb.from('profiles').update({ display_name:nm }).eq('id', STATE.user.id); STATE.profile.display_name=nm; }
    }
    // couple
    let { data:mem } = await sb.from('couple_members').select('couple_id').eq('user_id', STATE.user.id).limit(1).maybeSingle();
    if(!mem){
      STATE.couple=null;
      if(!localStorage.getItem('afterglow_arrived')){ renderArrival(renderPairing); return; }
      renderPairing(); return;
    }
    STATE.couple = mem.couple_id;
    // partner
    let { data:members } = await sb.from('couple_members').select('user_id').eq('couple_id', STATE.couple);
    const partnerId = (members||[]).map(m=>m.user_id).find(id=>id!==STATE.user.id);
    if(partnerId){
      let { data:pp } = await sb.from('profiles').select('*').eq('id', partnerId).maybeSingle();
      STATE.partner = pp || {id:partnerId, display_name:'Your person'};
    } else { STATE.partner = null; }
    subscribeRealtime();
    subscribePresence();                     // live "your person is here" awareness
    await renderToday();
    try{ await syncLanterns(); }catch(e){}   // bloom a lantern if one was crossed today
  }catch(e){
    renderError("We could not reach your glow. Check your connection.", loadContext);
  }
}

function renderError(msg, retry){
  currentView='error';

  const b=document.getElementById('retryBtn'); if(b) b.onclick=()=>{ if(retry) retry(); };
}

function subscribeRealtime(){
  if(STATE.realtimeChan) sb.removeChannel(STATE.realtimeChan);
  STATE.realtimeChan = sb.channel('couple-'+STATE.couple)
    .on('postgres_changes', { event:'*', schema:'public', table:'glows', filter:'couple_id=eq.'+STATE.couple }, (payload)=>{
      const g = payload.new;
      if(payload.eventType==='INSERT' && g && g.user_id!==STATE.user.id){ notifyPartnerGlow(g); vib([0,16,28,16]); }  // their glow arrives — a soft "they're here"
      if(currentView==='today') renderToday(true);
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'warmth', filter:'couple_id=eq.'+STATE.couple }, (payload)=>{
      const w = payload.new;
      if(w && w.from_user!==STATE.user.id) vib([0,40,55,45]);   // your person sat with your glow — you are being held
      if(currentView==='today') renderToday(true);
    })
    .subscribe();
}

// Show a system notification when the partner's glow arrives (app open/backgrounded).
function notifyPartnerGlow(g){
  if(localStorage.getItem('afterglow_notif')!=='on') return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const name=(STATE.partner&&STATE.partner.display_name)||'Your person';
  const opts={ body:name+' felt '+moodLabel(g.mood).toLowerCase()+' today.', icon:'icon-192.png', badge:'icon-192.png', tag:'glow-'+g.id };
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification('A glow arrived', opts)).catch(()=>{ try{ new Notification('A glow arrived', opts); }catch(_){} });
    } else { new Notification('A glow arrived', opts); }
  }catch(e){}
}

let HAPTICS = localStorage.getItem('afterglow_haptics')!=='off';   // gentle by default; user can mute
// Native app → Apple Core Haptics / Android via Capacitor Haptics plugin (rich, reliable).
const CapHaptics = (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics) ? window.Capacitor.Plugins.Haptics : null;
// iOS Safari/PWA has NO Vibration API; iOS 17.4+ can fire a haptic via the native <input switch> control.
let _hapSwitch=null;
function _iosHapticInit(){
  if(_hapSwitch || !document.body) return;
  const l=document.createElement('label');
  l.setAttribute('aria-hidden','true');
  l.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none';
  const i=document.createElement('input'); i.type='checkbox'; i.setAttribute('switch',''); i.tabIndex=-1;
  l.appendChild(i); document.body.appendChild(l); _hapSwitch=i;
}
function vib(p){
  if(!HAPTICS) return;
  try{
    if(CapHaptics){ const strong=Array.isArray(p)||p>24; CapHaptics.impact({ style: strong?'MEDIUM':'LIGHT' }); return; }
    if(navigator.vibrate){ navigator.vibrate(p); return; }      // Android web
    _iosHapticInit(); if(_hapSwitch) _hapSwitch.click();         // iOS web: a light tap (best-effort, in-gesture only)
  }catch(e){}
}
function reducedMotion(){ return window.matchMedia('(prefers-reduced-motion:reduce)').matches; }
function dayPart(){ const h=new Date().getHours(); return h<5?'late':h<12?'morning':h<17?'afternoon':h<22?'evening':'late'; }
function greeting(){ const p=dayPart(); return p==='late'?'Hello':'Good '+p; }
function fmtDate(d){ try{ return new Date(d+'T00:00').toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'}); }catch(e){ return d; } }

// ---- RECEIVE ----
function renderReceive(theirs){
  currentView='receive';
  const name=esc(STATE.partner?.display_name||'Your person');
  const reduce=reducedMotion();
  root.innerHTML=`
  <div class="screen">
    ${closeBar(name)}
    <div class="center">
      <div class="warm-stage" id="stage">
        <div class="glow glow-${theirs.mood} lg warm-glow" id="warmGlow"></div>
        <div class="warm-ring" id="warmRing"></div>
      </div>
      <h2 id="warmTitle">${name} felt <em class="serif-it">${moodLabel(theirs.mood).toLowerCase()}</em> today.</h2>
      ${theirs.shared_note?`<p class="serif-it dim" id="warmShared">${esc(theirs.shared_note)}</p>`:''}
      <button class="btn" id="warmBtn" style="max-width:320px;touch-action:none;user-select:none;-webkit-user-select:none">♡ Hold to send warmth</button>
      <p class="tiny" id="warmNote">Hold ${name}'s glow close.</p>
    </div>
  </div>`;
  document.getElementById('back').onclick=renderToday;

  const btn=document.getElementById('warmBtn');
  const glow=document.getElementById('warmGlow');
  const ring=document.getElementById('warmRing');
  const note=document.getElementById('warmNote');
  const stage=document.getElementById('stage');
  const HOLD=1600;
  let raf=null, timer=null, startT=0, done=false, pulseI=0;
  // a heartbeat that quickens as warmth builds: pulse points accelerate toward the release
  const PULSES=[0.16,0.32,0.46,0.58,0.68,0.77,0.84,0.90,0.95,0.99];

  function frame(now){
    if(!startT) startT=now;
    const p=Math.min((now-startT)/HOLD, 1);
    glow.style.transform='scale('+(1+p*0.28)+')';
    glow.style.filter='blur('+(10+p*8)+'px) brightness('+(1+p*0.55)+')';
    ring.classList.add('on');
    const deg=p*360;
    ring.style.background='conic-gradient(#5EEAD4 '+deg+'deg, rgba(94,234,212,.10) '+deg+'deg)';
    while(pulseI<PULSES.length && p>=PULSES[pulseI]){ vib(5+Math.round(pulseI*0.9)); pulseI++; }  // soft → fuller
    if(p>=1){ complete(); return; }
    raf=requestAnimationFrame(frame);
  }
  function start(e){
    if(done) return;
    if(e && e.cancelable) e.preventDefault();
    btn.classList.add('warm-btn-hold');
    btn.textContent='♡ holding';
    note.textContent='keep holding…';
    startT=0; pulseI=0; vib(6);   // a first soft touch as you press
    if(reduce){ note.textContent='holding…'; timer=setTimeout(complete, HOLD); return; }
    glow.style.animation='none';            // take over from the breathe loop
    raf=requestAnimationFrame(frame);
  }
  function cancel(){
    if(done) return;
    if(raf){ cancelAnimationFrame(raf); raf=null; }
    if(timer){ clearTimeout(timer); timer=null; }
    startT=0;
    btn.classList.remove('warm-btn-hold');
    btn.textContent='♡ Hold to send warmth';
    note.textContent='Hold a little longer to let it land.';
    if(!reduce){
      glow.style.transition='transform .6s ease, filter .6s ease';
      glow.style.transform='scale(1)'; glow.style.filter='';
      ring.classList.remove('on');
      setTimeout(()=>{ glow.style.transition=''; glow.style.animation=''; }, 620);
    }
  }
  function complete(){
    if(done) return; done=true;
    if(raf){ cancelAnimationFrame(raf); raf=null; }
    if(timer){ clearTimeout(timer); timer=null; }
    vib([0,30,50,70,55]);   // warmth lands — a full, settling thump
    ring.classList.remove('on');
    btn.disabled=true; btn.classList.remove('warm-btn-hold'); btn.textContent='warmth sent';
    const title=document.getElementById('warmTitle'); if(title) title.textContent='';
    const shared=document.getElementById('warmShared'); if(shared) shared.style.display='none';
    note.textContent=name+' will feel you sat with this.';
    if(!reduce){
      glow.style.transition='transform .9s cubic-bezier(.2,.7,.2,1), filter .9s ease';
      glow.style.transform='scale(1.38)';
      glow.style.filter='blur(16px) brightness(1.7)';
      for(let i=0;i<3;i++){ const r=document.createElement('div'); r.className='ripple'; r.style.animationDelay=(i*0.18)+'s'; stage.appendChild(r); }
      for(let i=0;i<6;i++){ const h=document.createElement('div'); h.className='heart'; h.textContent='♡';
        h.style.setProperty('--dx', Math.round(Math.random()*120-60)+'px'); h.style.left=(44+Math.random()*12)+'%';
        h.style.animationDelay=(i*0.1)+'s'; stage.appendChild(h); }
      setTimeout(()=>{ glow.style.transition='transform 1.2s ease, filter 1.2s ease'; glow.style.transform='scale(1)'; glow.style.filter=''; }, 950);
    }
    doWarm(theirs);
    setTimeout(renderToday, reduce?1400:2700);
  }
  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', cancel);
  btn.addEventListener('pointerleave', cancel);
  btn.addEventListener('pointercancel', cancel);
}

// ---- MEET IN THE LIGHT (live shared breath) ----
// Presence tells us when your person is here; the breath is driven by the wall clock,
// so both phones rise and fall together with no server in the loop. Broadcast carries live pulses.
function subscribePresence(){
  if(STATE.presenceChan){ sb.removeChannel(STATE.presenceChan); STATE.presenceChan=null; }
  STATE.partnerPresent=false; STATE.partnerInMoment=false;
  const me=STATE.user.id;
  const ch=sb.channel('meet-'+STATE.couple, { config:{ presence:{ key:me } } });
  const read=()=>{
    const st=ch.presenceState();
    const others=Object.keys(st).filter(k=>k!==me);
    STATE.partnerPresent=others.length>0;
    STATE.partnerInMoment=others.some(k=>(st[k]||[]).some(m=>m.inMoment));
    onPresenceChange();
  };
  ch.on('presence',{event:'sync'}, read)
    .on('presence',{event:'join'}, read)
    .on('presence',{event:'leave'}, read)
    .on('broadcast',{event:'pulse'}, ()=>{ if(currentView==='meet') feelPulse(); })
    .subscribe(async(s)=>{ if(s==='SUBSCRIBED'){ try{ await ch.track({ uid:me, inMoment:false }); }catch(e){} } });
  STATE.presenceChan=ch;
}
function setMyMoment(inMoment){ try{ STATE.presenceChan && STATE.presenceChan.track({ uid:STATE.user.id, inMoment }); }catch(e){} }
function onPresenceChange(){
  if(currentView==='today'){ const p=document.getElementById('presencePill'); if(p) p.classList.toggle('hidden', !STATE.partnerPresent); }
  else if(currentView==='meet'){ updateMeet(); }
}
function feelPulse(){
  vib([0,30,40]);
  const st=document.getElementById('meetStage');
  if(st && !reducedMotion()){ const r=document.createElement('div'); r.className='meet-pulse'; st.appendChild(r); setTimeout(()=>r.remove(),1600); }
}
let meetRaf=null;
async function renderMeet(){
  currentView='meet';
  const reduce=reducedMotion();
  const them=esc(STATE.partner?.display_name||'Your person');
  // glow colours from today's moods, if shared
  let myMood='calm', theirMood='love';
  try{
    const { data:glows } = await sb.from('glows').select('user_id,mood').eq('couple_id', STATE.couple).eq('local_date', todayLocal());
    const mine=(glows||[]).find(g=>g.user_id===STATE.user.id), th=(glows||[]).find(g=>g.user_id!==STATE.user.id);
    if(mine) myMood=mine.mood; if(th) theirMood=th.mood;
  }catch(e){}
  root.innerHTML=`<div class="screen">
    ${closeBar('Together, now')}
    <div class="center">
      <div class="meet-merge waiting" id="meetStage" role="img" aria-label="Two glows breathing together">
        <div class="glow glow-${theirMood} mb"></div>
        <div class="glow glow-${myMood} ma"></div>
      </div>
      <p class="meet-guide" id="meetGuide" aria-live="polite">breathe in</p>
      <p class="dim" id="meetStatus" style="max-width:300px;font-size:14px"></p>
      <button class="btn ghost" id="sendPulse" style="max-width:260px">♡ Send a pulse</button>
    </div></div>`;
  document.getElementById('back').onclick=leaveMeet;
  document.getElementById('sendPulse').onclick=()=>{ try{ STATE.presenceChan && STATE.presenceChan.send({ type:'broadcast', event:'pulse', payload:{} }); }catch(e){} vib(14); };
  setMyMoment(true);
  updateMeet();
  const CYCLE=9000, stage=document.getElementById('meetStage'), guide=document.getElementById('meetGuide');
  let lastCycle=-1;
  function frame(){
    const now=Date.now();
    const frac=(now%CYCLE)/CYCLE;
    const s=(1-Math.cos(frac*2*Math.PI))/2;            // 0 → 1 → 0, eased
    if(!reduce && stage) stage.style.transform='scale('+(0.84+0.30*s)+')';
    if(guide){ const t=frac<0.5?'breathe in':'let go'; if(guide.textContent!==t) guide.textContent=t; }
    const cyc=Math.floor(now/CYCLE);
    if(frac>0.47 && frac<0.53 && cyc!==lastCycle){ lastCycle=cyc; if(STATE.partnerInMoment) vib(9); }  // shared pulse at each inhale
    meetRaf=requestAnimationFrame(frame);
  }
  meetRaf=requestAnimationFrame(frame);
}
function updateMeet(){
  const stage=document.getElementById('meetStage'), status=document.getElementById('meetStatus');
  if(!stage) return;
  const them=(STATE.partner&&STATE.partner.display_name)||'Your person';
  if(STATE.partnerInMoment){ stage.classList.remove('waiting'); if(status) status.textContent='You’re breathing together. Stay a while.'; }
  else if(STATE.partnerPresent){ stage.classList.add('waiting'); if(status) status.textContent=them+' is here. Breathe — they may sit with you.'; }
  else { stage.classList.add('waiting'); if(status) status.textContent='You’re here. '+them+' will feel it when they arrive.'; }
}
function leaveMeet(){
  if(meetRaf){ cancelAnimationFrame(meetRaf); meetRaf=null; }
  setMyMoment(false);
  renderToday();
}

// ---- OUR STORY (timeline) ----
async function renderStory(){
  currentView='story';
  renderLoading();
  try{
    const me=STATE.user.id;
    const them=esc(STATE.partner?.display_name||'Your person');
    const [gRes, wRes] = await Promise.all([
      sb.from('glows').select('*').eq('couple_id', STATE.couple).order('local_date',{ascending:false}),
      sb.from('warmth').select('to_glow').eq('couple_id', STATE.couple)
    ]);
    const glows=gRes.data||[];
    const glowById={}; glows.forEach(g=>glowById[g.id]=g);
    const warmDates=new Set();
    (wRes.data||[]).forEach(w=>{ const g=glowById[w.to_glow]; if(g) warmDates.add(g.local_date); });

    const byDate={};
    glows.forEach(g=>{ (byDate[g.local_date]=byDate[g.local_date]||[]).push(g); });
    const dates=Object.keys(byDate).sort().reverse();

    if(!dates.length){
      root.innerHTML=`<div class="screen">
        ${closeBar('Our story')}
        <div class="center"><div class="glow glow-calm sm" style="opacity:.5"></div>
          <p class="dim serif-it" style="max-width:280px">Your story begins with the first glow you share. Come back after tonight.</p></div></div>`;
      document.getElementById('back').onclick=renderMenu; return;
    }

    const latest=byDate[dates[0]];
    const heroT=latest.find(g=>g.user_id!==me), heroM=latest.find(g=>g.user_id===me);
    const firstDate=dates[dates.length-1];

    // ---- concentric rings (newest = outermost), each ring a day, glow = blend of both moods ----
    const MOODHEX={happiness:'#E8B24A',sadness:'#3E5C8C',anger:'#C0413A',anxious:'#A7A24F',nostalgic:'#B98AA6',love:'#EA6FA4',calm:'#2FA8A0',gratitude:'#7FB58F'};
    const h2=h=>{h=h.replace('#','');return[0,2,4].map(i=>parseInt(h.slice(i,i+2),16));};
    const mix=(a,b)=>'#'+[0,1,2].map(i=>Math.round((h2(a)[i]+h2(b)[i])/2).toString(16).padStart(2,'0')).join('');
    const dayColor=gs=>{ const mi=gs.find(g=>g.user_id===me), th=gs.find(g=>g.user_id!==me);
      const a=th&&MOODHEX[th.mood], b=mi&&MOODHEX[mi.mood];
      return (a&&b)?mix(a,b):(a||b||'#2FA8A0'); };
    const MAXR=7, GAP=44, OUT=316;
    const ringDates=dates.slice(0, MAXR);
    const ringR=[];
    // faint scaffold: every slot, so the silhouette is whole even on day one
    let ghosts='';
    for(let p=0;p<MAXR;p++){ const dia=OUT-p*GAP; ghosts+=`<div class="ring ghost" style="width:${dia}px;height:${dia}px"></div>`; }
    const rings=ringDates.map((d,p)=>{
      const dia = OUT - p*GAP;
      ringR.push({date:d, r:dia/2});
      return `<div class="ring" style="width:${dia}px;height:${dia}px;color:${dayColor(byDate[d])}"></div>`;
    }).join('');
    const ringHtml=`<div class="ring-stage" id="ringStage" role="img" aria-label="A glowing ring for each of your ${dates.length} ${dates.length===1?'evening':'evenings'} together. Use the list below to open a day.">
        <div class="ring-aura" style="background:radial-gradient(circle, rgba(94,234,212,.09) 0%, rgba(6,20,24,0) 62%)"></div>
        <div class="ring-spin">${ghosts}${rings}</div>
        <div class="ring-core" style="background:radial-gradient(circle, #ffffff 0%, rgba(231,245,241,.9) 20%, rgba(94,234,212,.30) 54%, rgba(6,20,24,0) 78%); box-shadow:0 0 54px 10px rgba(94,234,212,.32)"></div>
      </div>`;
    const legend=MOODS.map(m=>`<span><i style="background:${m.color};box-shadow:0 0 6px ${m.color}"></i>${m.label.toLowerCase()}</span>`).join('');

    let body='', lastMonth='';
    dates.forEach(d=>{
      const dt=new Date(d+'T00:00');
      const mk=dt.toLocaleDateString(undefined,{month:'long',year:'numeric'});
      if(mk!==lastMonth){ body+=`<div class="story-month">${mk}</div>`; lastMonth=mk; }
      const gs=byDate[d];
      const mine=gs.find(g=>g.user_id===me);
      const theirs=gs.find(g=>g.user_id!==me);
      const both=mine&&theirs;
      let line;
      if(both) line=`${them} felt <span class="mood-em">${moodLabel(theirs.mood).toLowerCase()}</span> · you felt <span class="mood-em">${moodLabel(mine.mood).toLowerCase()}</span>`;
      else if(theirs) line=`${them} felt <span class="mood-em">${moodLabel(theirs.mood).toLowerCase()}</span> · <span class="dim">you were quiet</span>`;
      else line=`you felt <span class="mood-em">${moodLabel(mine.mood).toLowerCase()}</span> · <span class="dim">${them} was quiet</span>`;
      const note = (theirs&&theirs.shared_note) || (mine&&mine.shared_note) || '';
      const dayName=dt.toLocaleDateString(undefined,{weekday:'long', day:'numeric'});
      body+=`<div class="story-day" data-date="${d}" role="button" tabindex="0" aria-label="Open ${dayName}">
        <div class="node ${both?'both':''}"></div>
        <div class="sd-date">${dayName}</div>
        <div class="sd-glows">${theirs?`<div class="glow glow-${theirs.mood}"></div>`:''}${mine?`<div class="glow glow-${mine.mood}"></div>`:''}</div>
        <div class="sd-line">${line}</div>
        ${note?`<div class="sd-note">&ldquo;${esc(note)}&rdquo;</div>`:''}
        ${warmDates.has(d)?`<div class="sd-warm">♡ warmth passed between you</div>`:''}
      </div>`;
    });

    // lanterns earned (forgiving milestones) — computed from the same shared history
    STATE.lanterns = computeLanterns([...dates].sort());
    const lanternStrip = STATE.lanterns.length ? `
      <div class="lantern-strip">
        <p class="kicker" style="text-align:center;color:var(--content)">Lanterns</p>
        <div class="lantern-row">${STATE.lanterns.map((L,i)=>`<button class="lantern-chip" data-li="${i}" aria-label="${esc(L.title)}, ${fmtDate(L.earnedOn)}"><span class="lantern-dot" aria-hidden="true"></span>${esc(L.title)}</button>`).join('')}</div>
      </div>` : '';

    root.innerHTML=`<div class="screen">
      ${closeBar('Our story')}
      <div class="story-hero">
        ${ringHtml}
        <p class="serif-it" style="font-size:18px;margin-top:2px">${dates.length} ${dates.length===1?'evening':'evenings'} together.</p>
        <p class="serif-it dim" style="font-size:12.5px;margin-top:4px">Every evening, a little more light.</p>
        <div class="story-legend" style="margin-top:14px">${legend}</div>
        ${dates.length>1?`<p class="tiny" style="margin-top:10px">tap a ring to revisit a day</p>`:''}
      </div>
      ${lanternStrip}
      <div class="story-thread">${body}</div>
      <div class="faint serif-it" style="text-align:center;margin:22px 0 12px;font-size:12px">no streaks, no scores</div>
    </div>`;
    document.getElementById('back').onclick=renderMenu;
    document.querySelectorAll('.lantern-chip').forEach(el=>{ el.onclick=()=>renderLantern(STATE.lanterns[+el.dataset.li], {fromStory:true}); });
    document.querySelectorAll('.story-day').forEach(el=>{ el.onclick=()=>renderDayLetter(el.dataset.date, renderStory); });
    const stage=document.getElementById('ringStage');
    if(stage) stage.onclick=(e)=>{
      const rect=stage.getBoundingClientRect();
      const dist=Math.hypot(e.clientX-(rect.left+rect.width/2), e.clientY-(rect.top+rect.height/2));
      let best=null, bd=1e9;
      ringR.forEach(rr=>{ const dd=Math.abs(rr.r-dist); if(dd<bd){ bd=dd; best=rr; } });
      if(best && bd<26) renderDayLetter(best.date, renderStory);
    };
  }catch(e){ renderError("We could not open your story.", renderStory); }
}

// ---- CALENDAR ----
async function renderCalendar(offset){
  offset = (typeof offset==='number' && isFinite(offset)) ? offset : 0;   // guard against event objects passed by onclick
  currentView='calendar';
  renderLoading();
  try{
    const { data:glows } = await sb.from('glows').select('*').eq('couple_id', STATE.couple);
    const me=STATE.user.id;
    const mineBy={}, themBy={};
    (glows||[]).forEach(g=>{ (g.user_id===me?mineBy:themBy)[g.local_date]=g; });
    const base=new Date(); base.setDate(1); base.setMonth(base.getMonth()+offset);
    const y=base.getFullYear(), m=base.getMonth();
    const startDow=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate();
    const todayS=todayLocal();
    const monthName=base.toLocaleDateString(undefined,{month:'long',year:'numeric'});
    const dot=(g,mineDot)=>g?`<span class="cal-dot ${mineDot?'mine':''}" style="background:var(--${g.mood});box-shadow:0 0 6px var(--${g.mood})"></span>`:'';
    let cells='';
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>cells+=`<div class="cal-h tiny" aria-hidden="true">${d}</div>`);
    for(let i=0;i<startDow;i++) cells+=`<div aria-hidden="true"></div>`;
    for(let d=1; d<=days; d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const tg=themBy[ds], mg=mineBy[ds], has=tg||mg;
      cells+=`<div class="cal-cell ${has?'has':''} ${ds===todayS?'today':''}" data-date="${ds}">
        <div class="cal-orbs">${dot(tg,false)}${dot(mg,true)}</div><span class="cal-num">${d}</span></div>`;
    }
    const canForward = offset<0;  // never navigate into the future
    root.innerHTML=`<div class="screen">
      ${closeBar('Calendar')}
      <div class="cal-head">
        <button class="iconbtn" id="prevM" aria-label="Previous month">‹</button>
        <h2 class="serif-it" aria-live="polite">${monthName}</h2>
        <button class="iconbtn" id="nextM" aria-label="Next month" ${canForward?'':'disabled aria-disabled="true"'}>›</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="faint serif-it" style="text-align:center;margin-top:18px;font-size:12px">each light is a day you showed up · the ringed light is yours</div>
    </div>`;
    document.getElementById('back').onclick=renderMenu;
    document.getElementById('prevM').onclick=()=>renderCalendar(offset-1);
    const nx=document.getElementById('nextM'); if(nx && canForward) nx.onclick=()=>renderCalendar(offset+1);
    document.querySelectorAll('.cal-cell.has').forEach(el=>{
      el.setAttribute('role','button'); el.setAttribute('tabindex','0');
      el.setAttribute('aria-label','Open '+fmtDate(el.dataset.date));
      el.onclick=()=>renderDayLetter(el.dataset.date, renderCalendar);
    });
  }catch(e){ renderError("We could not open the calendar.", renderCalendar); }
}

// ---- DAY LETTER (one day in detail) ----
async function renderDayLetter(date, backFn){
  currentView='dayletter';
  renderLoading();
  try{
    const { data:glows } = await sb.from('glows').select('*').eq('couple_id', STATE.couple).eq('local_date', date);
    const me=STATE.user.id;
    const mine=(glows||[]).find(g=>g.user_id===me);
    const theirs=(glows||[]).find(g=>g.user_id!==me);
    let myPriv=null;
    if(mine){ const { data:pv } = await sb.from('glow_private').select('note').eq('glow_id', mine.id).maybeSingle(); myPriv=pv?.note||null; }
    // warmth exchanged that day
    let warmToTheirs=false, warmToMine=false;
    const ids=[mine&&mine.id, theirs&&theirs.id].filter(Boolean);
    if(ids.length){
      const { data:w } = await sb.from('warmth').select('from_user,to_glow').in('to_glow', ids);
      (w||[]).forEach(x=>{ if(theirs&&x.to_glow===theirs.id&&x.from_user===me) warmToTheirs=true; if(mine&&x.to_glow===mine.id&&x.from_user!==me) warmToMine=true; });
    }
    const them=esc(STATE.partner?.display_name||'Your person');
    const dt=new Date(date+'T00:00');
    const weekday=dt.toLocaleDateString(undefined,{weekday:'long'});
    const longd=dt.toLocaleDateString(undefined,{day:'numeric', month:'long', year:'numeric'});

    const passage=(g,nameHtml,warmLine,isMine)=> g?`
      <div class="letter-pass">
        <div class="glow glow-${g.mood} lp-glow"></div>
        <div class="lp-name">${nameHtml} felt <b>${moodLabel(g.mood).toLowerCase()}</b></div>
        ${g.word?`<div class="lp-word">&ldquo;${esc(g.word)}&rdquo;</div>`:''}
        ${g.shared_note?`<p class="lp-msg">${esc(g.shared_note)}</p>`:''}
        ${warmLine?`<div class="lp-warm">${warmLine}</div>`:''}
        ${isMine&&myPriv?`<div class="lp-private"><span class="tiny">just for you</span><p>${esc(myPriv)}</p></div>`:''}
      </div>`:'';

    const both=mine&&theirs;
    root.innerHTML=`<div class="screen">
      ${closeBar(dt.toLocaleDateString(undefined,{day:'numeric',month:'short'}))}
      <div class="letter-head" style="margin-top:14px">
        ${both?`<div class="merge letter-merge" style="width:120px;height:60px"><div class="glow glow-${theirs.mood} sm a"></div><div class="glow glow-${mine.mood} sm b"></div></div>`:''}
        <h1>${weekday}</h1>
        <div class="sub">${longd}</div>
      </div>
      ${passage(theirs, them, warmToTheirs?'♡ you sat with this glow':'', false)}
      ${both?`<div class="lp-divider"></div>`:''}
      ${passage(mine, 'You', warmToMine?'♡ '+them+' sat with your glow':'', true)}
      ${(!mine&&!theirs)?`<p class="dim serif-it" style="text-align:center;margin-top:48px">A quiet day. No glow was shared.</p>`:''}
      <div class="faint serif-it" style="text-align:center;margin:24px 0 12px;font-size:12px">kept, just as it was</div>
    </div>`;
    document.getElementById('back').onclick=()=>(backFn||renderStory)();
  }catch(e){ renderError("We could not open that day.", ()=>renderDayLetter(date, backFn)); }
}

// ---- GLOW REMINDERS (notifications) ----
function renderNotif(){
  currentView='notif';
  const them=esc(STATE.partner?.display_name||'your person');
  const supported = ('Notification' in window);
  const perm = supported ? Notification.permission : 'unsupported';
  const on = localStorage.getItem('afterglow_notif')==='on' && perm==='granted';
  let state;
  if(!supported){ state='<p class="dim" style="font-size:14px">This device does not support notifications. On iPhone, add Afterglow to your Home Screen first (Share → Add to Home Screen), then reminders can be turned on.</p>'; }
  else if(perm==='denied'){ state='<p class="dim" style="font-size:14px">Notifications are blocked in your browser settings. Allow them for this site, then come back.</p>'; }
  else if(on){ state='<p class="serif-it" style="color:rgba(94,234,212,.85)">♡ Reminders are on.</p><p class="dim" style="font-size:13px;margin-top:6px">You will be told gently when '+them+' shares a glow, even when Afterglow is closed.</p>'; }
  else { state='<p class="dim" style="font-size:14px;max-width:300px">Afterglow can gently let you know when '+them+' shares their glow. No badges, no counts, no pressure, just a quiet nudge.</p>'; }

  root.innerHTML=`<div class="screen">
    ${closeBar('Glow reminders')}
    <div class="center">
      <div class="glow glow-calm sm"></div>
      <h2 class="serif-it">A quiet nudge</h2>
      ${state}
      <div style="width:100%;max-width:280px;margin-top:8px">
        ${(supported && perm!=='denied' && !on)?`<button class="btn" id="enable">Turn on reminders</button>`:''}
        ${on?`<button class="btn ghost" id="disable">Turn reminders off</button>`:''}
      </div>
      <div style="width:100%;max-width:280px;margin-top:22px;border-top:1px solid var(--line);padding-top:18px">
        <button class="btn ghost" id="haptics">${HAPTICS?'Gentle haptics: on':'Gentle haptics: off'}</button>
        <p class="faint" style="font-size:12px;margin-top:8px;max-width:300px">Afterglow can give a soft touch when warmth passes or your person appears. Turn it off if you prefer stillness.</p>
      </div>
      <p class="faint serif-it" style="font-size:12px;margin-top:14px;max-width:300px">For a reminder even when the app is fully closed, add Afterglow to your Home Screen.</p>
    </div></div>`;
  document.getElementById('back').onclick=renderMenu;
  document.getElementById('haptics').onclick=()=>{ HAPTICS=!HAPTICS; localStorage.setItem('afterglow_haptics', HAPTICS?'on':'off'); if(HAPTICS) vib([0,18,30,20]); renderNotif(); };
  const en=document.getElementById('enable');
  if(en) en.onclick=async()=>{
    setBtn('enable', true, 'Asking…');
    try{
      const res=await Notification.requestPermission();
      if(res==='granted'){
        localStorage.setItem('afterglow_notif','on');
        await subscribePush();   // register for closed-app push (works once the Edge Function is deployed)
        try{ if(navigator.serviceWorker){ const reg=await navigator.serviceWorker.ready; reg.showNotification('Reminders on', {body:'We will glow gently when '+them+' checks in.', icon:'icon-192.png'}); } }catch(_){}
        vib(12);
      }
    }catch(e){}
    renderNotif();
  };
  const dis=document.getElementById('disable');
  if(dis) dis.onclick=async()=>{ localStorage.setItem('afterglow_notif','off'); await unsubscribePush(); renderNotif(); };
}

}

// ---- ACCOUNT & PRIVACY (unpair / delete) ----
function renderAccount(){
  currentView='account';
  const them=esc(STATE.partner?.display_name||'your person');
  root.innerHTML=`<div class="screen">
    ${closeBar('Account & privacy')}
    <div class="center">
      <h2 class="serif-it">Yours to keep, yours to end.</h2>
      <p class="dim" style="max-width:310px;font-size:14px">Afterglow holds something tender. You are always free to step away from it — gently or completely.</p>
      <div style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;margin-top:14px">
        ${STATE.couple?`<button class="btn ghost" id="unpair">Unpair from ${them}</button>`:''}
        <button class="btn ghost" id="delacct" style="border-color:rgba(255,155,155,.35);color:#ff9b9b">Delete my account</button>
      </div>
      <p class="faint" style="font-size:12px;max-width:300px;margin-top:14px">
        <a class="link" style="font-size:12px;min-height:auto;padding:2px;margin:-2px" href="${LEGAL_BASE}/terms.html" target="_blank" rel="noopener">Terms</a> ·
        <a class="link" style="font-size:12px;min-height:auto;padding:2px;margin:-2px" href="${LEGAL_BASE}/privacy.html" target="_blank" rel="noopener">Privacy</a></p>
    </div></div>`;
  document.getElementById('back').onclick=renderMenu;
  const up=document.getElementById('unpair');
  if(up) up.onclick=()=>confirmDanger({
    title:'Unpair from '+them+'?',
    body:'This unpairs you both and lets your shared story rest. Every glow, note, and warmth you shared is deleted for both of you. Your accounts stay. This cannot be undone.',
    confirmLabel:'Unpair and let it rest',
    onConfirm: doUnpair
  });
  document.getElementById('delacct').onclick=()=>confirmDanger({
    title:'Delete your account?',
    body:'This deletes your account, your glows, your private notes, and your shared story with '+them+' — for both of you. It cannot be undone.',
    confirmLabel:'Delete everything',
    onConfirm: doDeleteAccount
  });
}
function confirmDanger(o){
  currentView='confirm';
  root.innerHTML=`<div class="screen"><div class="center">
    <div class="glow glow-sadness sm" style="opacity:.7"></div>
    <h2 style="max-width:300px">${o.title}</h2>
    <p class="dim" style="max-width:300px;font-size:14px">${o.body}</p>
    <div style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;margin-top:12px">
      <button class="btn ghost" id="keep">Keep things as they are</button>
      <button class="btn ghost" id="confirmDo" style="border-color:rgba(255,155,155,.4);color:#ff9b9b">${o.confirmLabel}</button>
    </div>
    <div class="err" role="alert" id="dangererr"></div>
  </div></div>`;
  document.getElementById('keep').onclick=renderAccount;
  document.getElementById('confirmDo').onclick=async()=>{
    setBtn('confirmDo', true, 'One moment…');
    try{ await o.onConfirm(); }
    catch(e){ document.getElementById('dangererr').textContent=e.message||'That did not work. Nothing was changed.'; setBtn('confirmDo', false, o.confirmLabel); }
  };
}
async function doUnpair(){
  const { error } = await sb.rpc('unpair');
  if(error) throw error;
  if(STATE.realtimeChan){ sb.removeChannel(STATE.realtimeChan); STATE.realtimeChan=null; }
  if(STATE.presenceChan){ sb.removeChannel(STATE.presenceChan); STATE.presenceChan=null; }
  STATE.couple=null; STATE.partner=null;
  toast('Unpaired. Be gentle with yourself.');
  renderPairing();
}
async function doDeleteAccount(){
  const { data:{ session } } = await sb.auth.getSession();
  const res = await fetch(SUPABASE_URL+'/functions/v1/super-service', {   // dashboard auto-named the delete-account function
    method:'POST',
    headers:{ 'Authorization':'Bearer '+session.access_token, 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' }
  });
  if(!res.ok){ throw new Error('Could not delete the account right now.'); }
  try{ await unsubscribePush(); }catch(e){}
  await sb.auth.signOut();
  toast('Your account is gone. Take care.');
}

// ============ utils ============
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function setBtn(id,busy,txt){ const b=document.getElementById(id); if(!b)return; b.disabled=busy; if(txt)b.textContent=txt; }

boot();
</script>
